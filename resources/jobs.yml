resources:
  jobs:
    eda_agent_job:
      name: eda_agent_job
      tasks:
        - task_key: run_eda_workflow
          python_wheel_task:
            package_name: eda_agent_db
            entry_point: main
            parameters:
              - "--dataset"
              - "--- add the dataset path here ---"
          job_cluster_key: eda_cluster
      job_clusters:
        - job_cluster_key: eda_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 1

